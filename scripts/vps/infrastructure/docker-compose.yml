services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - chmusicpro-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiproxy -d aiproxysrv"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - chmusicpro-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data:
  minio-data:

networks:
  chmusicpro-net:
    external: true
    name: chmusicpro-net
