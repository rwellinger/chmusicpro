<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Swiss Music Production</h1>
      <p>AI Powered Music Production System</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <!-- Email Field -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="Enter your email"
          [class.invalid]="isFieldInvalid('email')"
          (input)="clearError()"
          />
        @if (isFieldInvalid('email')) {
          <div class="error-message">
            {{ getErrorMessage('email') }}
          </div>
        }
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-input-container">
          <input
            id="password"
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="password"
            placeholder="Enter your password"
            [class.invalid]="isFieldInvalid('password')"
            (input)="clearError()"
            />
          <button
            type="button"
            class="password-toggle"
            (click)="togglePasswordVisibility()"
            tabindex="-1"
            >
            <span class="toggle-icon">{{ hidePassword ? '👁️' : '🙈' }}</span>
          </button>
        </div>
        @if (isFieldInvalid('password')) {
          <div class="error-message">
            {{ getErrorMessage('password') }}
          </div>
        }
      </div>

      <!-- Global Error Message -->
      @if (error) {
        <div class="error-message global-error">
          {{ error }}
        </div>
      }

      <!-- Submit Button -->
      <button
        type="submit"
        class="login-button"
        [disabled]="loading || loginForm.invalid"
        >
        @if (loading) {
          <span class="loading-spinner">⏳</span>
        }
        @if (!loading) {
          <span>Sign In</span>
        }
      </button>
    </form>

    <div class="register-link">
      <p>Don't have an account? <a routerLink="/register">Create one</a></p>
    </div>

    <div class="login-footer">
      <p>© 2026 Swiss Music Production</p>
    </div>
  </div>
</div>
