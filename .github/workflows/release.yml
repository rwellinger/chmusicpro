name: Build & Release

# Workflow disabled - Docker builds are now performed locally
# To re-enable, uncomment the 'on' section below
on:
  workflow_dispatch:  # Manual trigger only

# on:
#   push:
#     tags:
#       - 'v*.*.*'

env:
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────────────────────
  # Code Quality: Frontend (ESLint)
  # ─────────────────────────────────────────────────────────
  quality-frontend:
    name: Code Quality Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chmusicproweb/package-lock.json

      - name: Install dependencies
        working-directory: chmusicproweb
        run: npm ci --prefer-offline --no-audit

      - name: Run ESLint
        working-directory: chmusicproweb
        run: npm run lint

      - name: Run Unit Tests
        working-directory: chmusicproweb
        run: npm run test -- --watch=false --browsers=ChromeHeadless

  # ─────────────────────────────────────────────────────────
  # Code Quality: Backend (Ruff + pytest)
  # ─────────────────────────────────────────────────────────
  quality-backend:
    name: Code Quality Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: chmusicprosrv/pyproject.toml

      - name: Install dependencies
        working-directory: chmusicprosrv
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,test]"

      - name: Run Ruff (Linter)
        working-directory: chmusicprosrv
        run: ruff check .

      - name: Run Ruff (Formatter Check)
        working-directory: chmusicprosrv
        run: ruff format --check .

      - name: Run Unit Tests
        working-directory: chmusicprosrv
        run: pytest -v

  # ─────────────────────────────────────────────────────────
  # Backend: chmusicprosrv-app
  # ─────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend (chmusicprosrv-app)
    runs-on: ubuntu-latest
    needs: [quality-frontend, quality-backend]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            echo "VERSION=${LATEST_TAG}-SNAPSHOT" >> $GITHUB_OUTPUT
          fi

      - name: Build and push chmusicprosrv-app
        uses: docker/build-push-action@v5
        with:
          context: ./chmusicprosrv
          file: ./chmusicprosrv/Dockerfile
          target: app
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/chmusicprosrv-app:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/chmusicprosrv-app:latest
          cache-from: type=gha,scope=chmusicprosrv-app
          cache-to: type=gha,mode=max,scope=chmusicprosrv-app

      - name: Build Summary
        run: |
          echo "## Backend Build Successful! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ github.repository_owner }}/chmusicprosrv-app:${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────
  # Frontend: chmusicproweb-app
  # ─────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend (chmusicproweb-app)
    runs-on: ubuntu-latest
    needs: [quality-frontend, quality-backend]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            echo "VERSION=${LATEST_TAG}-SNAPSHOT" >> $GITHUB_OUTPUT
          fi

      - name: Build and push chmusicproweb-app
        uses: docker/build-push-action@v5
        with:
          context: ./chmusicproweb
          file: ./chmusicproweb/Dockerfile
          target: production
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/chmusicproweb-app:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/chmusicproweb-app:latest

      - name: Build Summary
        run: |
          echo "## Frontend Build Successful! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ github.repository_owner }}/chmusicproweb-app:${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
