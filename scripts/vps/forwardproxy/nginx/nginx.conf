events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # CRITICAL: Max upload size for batch uploads (Mirror Sync / file upload)
  # FLAC files can be 100-150MB each, stems are even larger
  # Conservative: 3 files per batch x 200MB = 600MB -> Set to 2GB for safety margin
  client_max_body_size 2G;

  # Rate limiting zone
  limit_req_zone $binary_remote_addr zone=one:10m rate=5r/s;

  # HTTP -> HTTPS redirect
  server {
    listen 80;
    server_name mymusicproduction.thwelly.ch;

    # Let's Encrypt ACME challenge (must be accessible via HTTP)
    location /.well-known/acme-challenge/ {
      root /usr/share/nginx/html;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name mymusicproduction.thwelly.ch;
    keepalive_requests 100;
    keepalive_timeout 120s;

    # Let's Encrypt certificates
    ssl_certificate     /etc/letsencrypt/live/mymusicproduction.thwelly.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mymusicproduction.thwelly.ch/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         EECDH+AESGCM:EDH+AESGCM;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ----------------------------------------------------
    # OpenAI (Image und Chat)
    # ----------------------------------------------------

    location /chmusicprosrv/api/v1/image {
      limit_req zone=one burst=10 delay=2;
      proxy_pass          http://chmusicprosrv:5050/api/v1/image;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  600s;
    }

    location /chmusicprosrv/api/v1/openai/chat {
      limit_req zone=one burst=10 delay=2;
      proxy_pass          http://chmusicprosrv:5050/api/v1/openai/chat;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  600s;
    }

    location /chmusicprosrv/api/v1/openai/costs {
      limit_req zone=one burst=10 delay=2;
      proxy_pass          http://chmusicprosrv:5050/api/v1/openai/costs;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  600s;
    }

    # ----------------------------------------------------
    # Ollama CHAT API Proxy
    # ----------------------------------------------------

    location /chmusicprosrv/api/v1/ollama/chat {
      limit_req zone=one burst=10 delay=2;
      proxy_pass          http://chmusicprosrv:5050/api/v1/ollama/chat;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  600s;
    }

    # Ollama Model Tags
    location /chmusicprosrv/api/v1/ollama/tags {
      limit_req zone=one burst=10 delay=2;
      proxy_pass          http://chmusicprosrv:5050/api/v1/ollama/tags;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  30s;
    }

    # ----------------------------------------------------
    # Claude CHAT API Proxy
    # ----------------------------------------------------

    location /chmusicprosrv/api/v1/claude/chat {
      limit_req zone=one burst=10 delay=2;
      proxy_pass          http://chmusicprosrv:5050/api/v1/claude/chat;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  600s;
    }

    # ----------------------------------------------------
    # Conversations API Proxy (AI Chat)
    # ----------------------------------------------------

    location /chmusicprosrv/api/v1/conversations {
      limit_req zone=one burst=10 delay=2;
      proxy_pass          http://chmusicprosrv:5050/api/v1/conversations;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  600s;

      # Disable buffering for potential streaming
      proxy_buffering     off;
    }

    # ----------------------------------------------------
    # Settings API Proxy
    # ----------------------------------------------------

    location /chmusicprosrv/api/v1/prompts {
      limit_req zone=one burst=10 delay=2;
      proxy_pass          http://chmusicprosrv:5050/api/v1/prompts;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  600s;
    }

    # ----------------------------------------------------
    # Lyric Parsing Rules API Proxy
    # ----------------------------------------------------

    location /chmusicprosrv/api/v1/lyric-parsing-rules {
      limit_req zone=one burst=10 delay=2;
      proxy_pass          http://chmusicprosrv:5050/api/v1/lyric-parsing-rules;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  30s;
    }

    # ----------------------------------------------------
    # Text Workshop API Proxy
    # ----------------------------------------------------

    location /chmusicprosrv/api/v1/workshops {
      limit_req zone=one burst=10 delay=2;
      proxy_pass          http://chmusicprosrv:5050/api/v1/workshops;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  600s;
    }

    # ----------------------------------------------------
    # Sketches API Proxy
    # ----------------------------------------------------

    location /chmusicprosrv/api/v1/sketches {
      limit_req zone=one burst=10 delay=2;
      proxy_pass          http://chmusicprosrv:5050/api/v1/sketches;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  30s;
    }

    # ----------------------------------------------------
    # SONG API Proxy
    # ----------------------------------------------------

    location /chmusicprosrv/api/v1/song {
      limit_req zone=one burst=10 delay=2;
      proxy_pass          http://chmusicprosrv:5050/api/v1/song;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  600s;
    }

    # ----------------------------------------------------
    # SONG Project API Proxy
    # ----------------------------------------------------

    location /chmusicprosrv/api/v1/song-projects {
      # Higher burst for Mirror Sync batch uploads
      limit_req zone=one burst=50 nodelay;
      proxy_pass          http://chmusicprosrv:5050/api/v1/song-projects;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  600s;
    }

    # ----------------------------------------------------
    # SONG Release API Proxy
    # ----------------------------------------------------

    location /chmusicprosrv/api/v1/song-releases {
      limit_req zone=one burst=10 delay=2;
      proxy_pass          http://chmusicprosrv:5050/api/v1/song-releases;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  600s;
    }

    # ----------------------------------------------------
    # System Context Templates API Proxy
    # ----------------------------------------------------

    location /chmusicprosrv/api/v1/system-context-templates {
      limit_req zone=one burst=10 delay=2;
      proxy_pass          http://chmusicprosrv:5050/api/v1/system-context-templates;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  600s;
    }

    location /chmusicprosrv/api/v1/ai-config {
      limit_req zone=one burst=10 delay=2;
      proxy_pass          http://chmusicprosrv:5050/api/v1/ai-config;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  600s;
    }

    # ----------------------------------------------------
    # Health Check Proxy
    # ----------------------------------------------------

    location /chmusicprosrv/api/v1/health {
      limit_req zone=one burst=10 delay=2;
      proxy_pass          http://chmusicprosrv:5050/api/v1/health;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  600s;
    }

    # ----------------------------------------------------
    # User Management API Proxy
    # ----------------------------------------------------

    location /chmusicprosrv/api/v1/user {
      limit_req zone=one burst=5 delay=1;
      proxy_pass          http://chmusicprosrv:5050/api/v1/user;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  30s;

      add_header X-Content-Type-Options nosniff always;
      add_header X-Frame-Options DENY always;
      add_header X-XSS-Protection "1; mode=block" always;
    }

    # ----------------------------------------------------
    # Equipment API Proxy
    # ----------------------------------------------------

    location /chmusicprosrv/api/v1/equipment {
      limit_req zone=one burst=10 delay=2;
      proxy_pass          http://chmusicprosrv:5050/api/v1/equipment;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  30s;
    }

    # ----------------------------------------------------
    # Domain Management API Proxy
    # ----------------------------------------------------

    location /chmusicprosrv/api/v1/domains {
      limit_req zone=one burst=10 delay=2;
      proxy_pass          http://chmusicprosrv:5050/api/v1/domains;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  30s;
    }

    # ----------------------------------------------------
    # Swagger API Documentation
    # ----------------------------------------------------

    location /chmusicprosrv/api/docs/ {
      proxy_pass          http://chmusicprosrv:5050/api/docs/;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  60s;
    }

    location /chmusicprosrv/api/openapi.json {
      proxy_pass          http://chmusicprosrv:5050/api/openapi.json;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  60s;

      add_header Access-Control-Allow-Origin * always;
      add_header Content-Type application/json always;
    }

    location /chmusicprosrv/api/openapi.yaml {
      proxy_pass          http://chmusicprosrv:5050/api/openapi.yaml;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_read_timeout  60s;

      add_header Access-Control-Allow-Origin * always;
      add_header Content-Type application/x-yaml always;
    }

    # ----------------------------------------------------
    # chmusicpro web ui
    # ----------------------------------------------------

    # index.html never cache (critical for updates)
    location ~* /chmusicpro/index\.html$ {
      alias /usr/share/nginx/html/chmusicproweb/browser/;
      add_header Cache-Control "no-cache, no-store, must-revalidate" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
      try_files /index.html =404;
    }

    # app-version.json never cache (critical for version check)
    location ~* /chmusicpro/assets/app-version\.json$ {
      alias /usr/share/nginx/html/chmusicproweb/browser/assets/;
      add_header Cache-Control "no-cache, no-store, must-revalidate" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
      try_files /app-version.json =404;
    }

    location ~* /assets/app-version\.json$ {
      alias /usr/share/nginx/html/chmusicproweb/browser/assets/;
      add_header Cache-Control "no-cache, no-store, must-revalidate" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
      try_files /app-version.json =404;
    }

    # i18n JSON files with short cache (1 hour)
    location ~ ^/chmusicpro/(assets/i18n/.+\.json)$ {
      root /usr/share/nginx/html/chmusicproweb/browser;
      try_files /$1 =404;
      add_header Cache-Control "max-age=3600, must-revalidate" always;
      add_header Content-Type "application/json; charset=utf-8" always;
    }

    location ~ ^/(assets/i18n/.+\.json)$ {
      root /usr/share/nginx/html/chmusicproweb/browser;
      try_files /$1 =404;
      add_header Cache-Control "max-age=3600, must-revalidate" always;
      add_header Content-Type "application/json; charset=utf-8" always;
    }

    # Font files with long cache (1 year)
    location ~ ^/chmusicpro/(assets/fonts/.+\.(ttf|woff|woff2|eot))$ {
      root /usr/share/nginx/html/chmusicproweb/browser;
      try_files /$1 =404;
      expires 1y;
      add_header Cache-Control "public, immutable" always;
      add_header Access-Control-Allow-Origin "*" always;
    }

    location ~ ^/(assets/fonts/.+\.(ttf|woff|woff2|eot))$ {
      root /usr/share/nginx/html/chmusicproweb/browser;
      try_files /$1 =404;
      expires 1y;
      add_header Cache-Control "public, immutable" always;
      add_header Access-Control-Allow-Origin "*" always;
    }

    # All other assets with hash long-term cache
    location /chmusicpro/assets/ {
      alias /usr/share/nginx/html/chmusicproweb/browser/assets/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location /assets/ {
      alias /usr/share/nginx/html/chmusicproweb/browser/assets/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # Main location for chmusicpro
    location /chmusicpro/ {
      alias /usr/share/nginx/html/chmusicproweb/browser/;
      try_files $uri $uri/ @fallback;
    }

    location @fallback {
      rewrite ^/chmusicpro/(.*)$ /chmusicpro/index.html last;
    }

    # ----------------------------------------------------
    # MinIO Console (Admin UI) - internal Docker network
    # ----------------------------------------------------
    # IMPORTANT: This MUST be the LAST location block!
    location / {
      proxy_pass          http://minio:9001;
      proxy_set_header    Host $http_host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto $scheme;
      proxy_set_header    X-Forwarded-Host $http_host;
      proxy_set_header    X-NginX-Proxy true;

      # WebSocket support for MinIO Console
      proxy_http_version  1.1;
      proxy_set_header    Upgrade $http_upgrade;
      proxy_set_header    Connection "upgrade";

      proxy_buffering     off;
      proxy_request_buffering off;

      proxy_read_timeout  600s;
      proxy_send_timeout  600s;

      add_header X-Content-Type-Options nosniff always;
      add_header X-Frame-Options SAMEORIGIN always;
    }

    # ----------------------------------------------------
    # health check
    # ----------------------------------------------------
    location /nginx_status {
      stub_status;
      access_log off;
      allow 127.0.0.1;
      deny all;
    }
  }
}
