services:
  db-migration:
    container_name: db-migration
    image: ghcr.io/rwellinger/chmusicprosrv-app:v0.3.2
    pull_policy: always
    command: sh -c "alembic upgrade head"
    restart: "no"
    env_file: ../.env
    volumes:
      - ./alembic.ini:/app/alembic.ini:ro
    networks:
      - chmusicpro-net

  chmusicprosrv-app:
    container_name: chmusicprosrv
    restart: unless-stopped
    image: ghcr.io/rwellinger/chmusicprosrv-app:v0.3.2
    pull_policy: always
    env_file: ../.env
    networks:
      - chmusicpro-net
    depends_on:
      db-migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: ghcr.io/rwellinger/chmusicproweb-app:v0.3.2
    container_name: forward-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./logs:/var/log/nginx
      - webui-content:/usr/share/nginx/html:ro
    networks:
      - chmusicpro-net
    depends_on:
      chmusicprosrv-app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nginx_status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  webui-content:

networks:
  chmusicpro-net:
    external: true
    name: chmusicpro-net
