@if (currentStep$ | async; as currentStep) {
  <nav class="step-bar" aria-label="Production Pipeline">
    <button class="home-button" (click)="goHome()" [matTooltip]="'sideMenu.dashboard' | translate">
      <i class="fas fa-home"></i>
    </button>

    <div class="steps-track">
      @for (step of steps; track step.step) {
        <div class="step-item"
             [class.active]="currentStep.step === step.step"
             [class.enabled]="step.enabled"
             [class.disabled]="!step.enabled">
          <div class="connector" [class.first]="step.step === 1"></div>
          <button class="step-circle"
                  [style.--step-color]="step.iconColor"
                  [disabled]="!step.enabled"
                  [matTooltip]="step.titleKey | translate"
                  (click)="goToStep(step)">
            {{ step.step }}
          </button>
          <div class="connector"></div>
        </div>
      }
    </div>
  </nav>
}
