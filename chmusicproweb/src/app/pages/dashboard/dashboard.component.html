<div class="dashboard-container">
    <div class="dashboard-header">
        <h1>{{ 'dashboard.title' | translate }}</h1>
        <p class="subtitle">{{ 'dashboard.subtitle' | translate }}</p>
    </div>

    <div class="tiles-grid">
        @for (tile of tiles; track tile.titleKey) {
            <div class="tile"
                 [class.disabled]="!tile.enabled"
                 [matTooltip]="tile.enabled ? '' : ('dashboard.comingSoon' | translate)"
                 matTooltipPosition="above"
                 (click)="onTileClick(tile)">
                <div class="tile-icon" [style.background-color]="tile.iconColor + '15'" [style.color]="tile.iconColor">
                    <i class="fas {{ tile.icon }}"></i>
                </div>
                <div class="tile-content">
                    <h3>{{ tile.titleKey | translate }}</h3>
                    <p>{{ tile.descriptionKey | translate }}</p>
                </div>
                @if (!tile.enabled) {
                    <span class="coming-soon-badge">{{ 'dashboard.comingSoon' | translate }}</span>
                }
            </div>
        }
    </div>
</div>
